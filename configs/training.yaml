# WHAT: boot camp + PPO + meta settings (ADR-0006/0007).
bootcamp:
  symbol: XAUUSD
  week_source: claude_picks       # after data audit; mixed week preferred
  bar_multiplier: 2.0             # perfect = 2x goal EVERY day, zero breaches
  second_week_proof: true
  explorative_week1: {entropy_coef: 0.05}
episode: one_trading_day
decide_every: 5                   # decision cadence: act once per N bars, hold between (one door
                                  # for training + eval + deployment — review 2026-07-20)
ppo:                              # consumed by training/ppo.py via core.configs
  gamma: 0.999
  lam: 0.95
  clip: 0.2
  lr: 3.0e-4
  epochs: 4
  rollout_days_per_update: 5
  entropy_coef: 0.01              # after week-1 exploration phase
policy:
  hidden: 128
  gru_layers: 1                   # compact: 2-core laptop reality (ADR-0007)
meta_optimizer:                   # LEGACY proposer (training/meta_optimizer.py) — human-approved only.
  mode: propose_only              # governs the OLD propose-only path ONLY; the autonomous
  search: random+evolution        # self-tuner lives under self_tuner: below (added 2026-07-20).
  trials_per_batch: 8
self_tuner:                       # 2026-07-20 — the autonomous self-tuner (training/meta_tuner.py).
  # Monty: "auto accept itself ONLY if consistency improves." The LAB self-adopts a change
  # ONLY when the paired ratchet PROVES real consistency went up (never on noise); the
  # champion is always kept; a final human gate stays before LIVE (real money).
  # The adopt gate is PAIRED and DAY-CLUSTERED: many correlated episodes on the same day
  # collapse to ONE day-vote, so a lucky day can't fake significance. A change is adopted only
  # if it beats the champion on FRESH select days (confirm_z) AND holds on the PERMANENT
  # held-out audit days — two independent fresh hurdles that can't be won on luck.
  mode: auto_adopt_lab            # lab self-adopts on a proven, out-of-sample consistency gain; LIVE still gated
  candidates_per_gen: 24          # K proposals probed each generation
  sel_frac: 0.30                  # each gen this fraction of the WORK pool is the ROTATING select set; the rest trains
  mutate_knobs: 3                 # jitter at most this many knobs per proposal (few-at-a-time; avoids degenerate corners)
  screen_z: 1.64                  # lenient day-clustered paired test to SHORTLIST vs the equal-budget control
  confirm_z: 2.0                  # day-clustered paired test on FRESH select days vs the frozen champion
  min_disagreements: 4            # min DISTINCT DAYS that must differ before a gate may fire (day-clustered)
  plateau_patience: 3             # no-adopt generations before exploration widens (then sawtooths back small)
  explore_scale: 0.25             # mutation step size; grows to a cap on plateau, resets on an adopt
  eval_episodes: 512              # episodes per score; paired by DAY, so many episodes/day collapse to one day-vote
run_limits:
  max_hours_per_run: 3            # Monty's cap before review (legacy CPU bootcamp). The GPU
                                  # self-tuner runs until Colab stops it; champion resumes from Drive.
seed: 20260718
